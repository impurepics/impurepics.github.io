<section class="home-feed">
  <nav class="tag-strip" aria-label="Browse by tag">
    <div class="tags">$tags$</div>
  </nav>

  <div class="home-layout">
    <div class="home-main">
      <a class="featured-pic" href="$featuredUrl$">
        <span class="featured-media">
          <img src="$featuredThumbnail$" alt="$featuredTitle$" />
        </span>
        <span class="featured-copy">
          <span class="featured-section-header">
            <i class="fa fa-random fa-color"></i>
            Random pic
          </span>
          <strong>$featuredTitle$</strong>
        </span>
      </a>
    </div>

    <aside class="home-side">
      <nav class="home-links" aria-label="Other links">
        <a href="/posts/page/1.html">
          <i class="fa fa-archive fa-color"></i>
          All pics
        </a>
        <a href="./quiz/index.html">
          <i class="fa fa-puzzle-piece fa-color"></i>
          Which typeclass are you?
        </a>
        <a href="https://impurepics.thinkific.com/courses/functional-thinking">
          <i class="fa fa-university fa-color"></i>
          FP course
        </a>
      </nav>

      <section>
        <h2>Latest video</h2>
        <div class="embed-responsive embed-responsive-16by9 video-preview">
          <iframe
            class="embed-responsive-item"
            src="https://www.youtube.com/embed?listType=playlist&list=UU9-egQYdpElHtvVM-t9qDWQ"
            title="Latest Impure Pics YouTube video"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen
          >
          </iframe>
        </div>
      </section>

      <section>
        <h2>FP book</h2>
        <iframe
          class="book-preview"
          id="data-blurb-bookshare-11263261"
          src="https://www.blurb.com/bookshare/app/index.html?bookId=11263261"
          title="Impure Pics book preview"
          allowfullscreen=""
          scrolling="no"
        >
        </iframe>
      </section>
    </aside>
  </div>

  <!--This feels weird but only adds a few KB, it's fine.-->
  <template id="featured-pics">
    $for(featuredPosts)$
    <a class="featured-pic" href="$url$">
      <span class="featured-media">
        <img src="$thumbnail$" alt="$title$" />
      </span>
      <span class="featured-copy">
        <span class="featured-section-header">
          <i class="fa fa-random fa-color"></i>
          Random pic
        </span>
        <strong>$title$</strong>
      </span>
    </a>
    $endfor$
  </template>
</section>

<script type="module" src="/js/home.js"></script>
