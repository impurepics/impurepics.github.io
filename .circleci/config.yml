version: 2
jobs:
  build:
    docker:
      - image: fpco/stack-build:lts-21.6
    branches:
      only:
        - hakyll
    steps:
      - checkout
      - restore_cache:
          keys:
            - v3-stack-work-{{ checksum "impure-site.cabal" }}-{{ checksum "stack.yaml.lock" }}
            - stack-work-
      - run:
          name: Build executable
          command: stack build
      - save_cache:
          paths:
            - .stack-work
            - /root/.stack/
          key: v3-stack-work-{{ checksum "impure-site.cabal" }}-{{ checksum "stack.yaml.lock" }}
      - deploy:
          name: Deploy master to Github Pages
          command: |
            git config --global user.email robots@circleci.com
            git config --global user.name CircleCI
            stack exec site rebuild
            git checkout master
            git reset --hard origin/master
            git pull --rebase
            cp -a _site/. .
            git add --all
            git commit -m "[`date '+%F %T %Z'`] New release"
            git push origin master:master
